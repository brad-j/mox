name: Release

# On a version tag (e.g. v0.1.0): create a GitHub Release, then build
# cross-platform binaries and attach them to it.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Create the Release once, up front, so the parallel build jobs have
  # something to upload their binaries to.
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub Release
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" \
                 --title "$GITHUB_REF_NAME" --generate-notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build and upload binary
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: mox
          target: ${{ matrix.target }}
          # tarball named e.g. mox-v0.1.0-x86_64-unknown-linux-gnu.tar.gz
          archive: $bin-$tag-$target
          # bundle the license + readme into each archive
          include: LICENSE,README.md
          # emit a .sha256 next to each archive
          checksum: sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
